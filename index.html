<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Special Question 💕</title>
  <meta name="description" content="A heartfelt question just for you.">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffe4ec 0%, #ffd6e0 30%, #ffc8d6 50%, #ffd6e0 70%, #ffe4ec 100%);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Floating hearts */
    .hearts-bg {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .heart {
      position: absolute;
      opacity: 0.15;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
      10%  { opacity: 0.15; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
    }

    /* ===== SCREENS ===== */
    .screen {
      position: absolute; inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .screen.active { display: flex; }

    /* ===== QUESTION CARD ===== */
    .card {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 28px;
      padding: 2.5rem 2.5rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(255,105,135,0.15), 0 2px 8px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.8);
      animation: cardAppear 1s cubic-bezier(0.34,1.56,0.64,1) forwards;
      opacity: 0; transform: translateY(40px) scale(0.95);
      max-width: 550px; width: 90%;
    }
    @keyframes cardAppear {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .emoji-top {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      animation: pulse 2s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .question {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #4a2036;
      line-height: 1.3;
      margin-bottom: 1.5rem;
    }
    .question span {
      display: block;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
      color: #8a5070;
      margin-top: 0.4rem;
    }

    .buttons { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }

    .btn {
      padding: 0.9rem 3rem;
      font-family: 'Poppins', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position: relative; overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
      transition: left 0.5s;
    }
    .btn:hover::before { left: 100%; }

    .btn-yes {
      background: linear-gradient(135deg, #ff6b8a, #ff4571);
      color: white;
      box-shadow: 0 6px 25px rgba(255,69,113,0.4);
    }
    .btn-yes:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 10px 35px rgba(255,69,113,0.55); }

    .btn-no {
      background: linear-gradient(135deg, #c9a0b8, #b48da3);
      color: white;
      box-shadow: 0 6px 25px rgba(180,141,163,0.35);
    }
    .btn-no:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 10px 35px rgba(180,141,163,0.5); }

    /* ===== RESULT SCREEN ===== */
    .result-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5vh 2vw;
      text-align: center;
      gap: 0;
    }

    .result-emoji {
      font-size: 2.2rem;
      animation: pulse 2s ease-in-out infinite;
      margin-bottom: 0.5vh;
    }

    .video-box {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      border: 3px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.3);
      width: auto;
      max-width: 300px;
      max-height: 50vh;
    }

    .video-box video {
      display: block;
      width: 100%;
      height: 100%;
      max-height: 50vh;
      object-fit: cover;
    }

    .result-text {
      margin-top: 1vh;
    }

    .caption-main {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #e74c7c;
      animation: textBounce 0.6s ease-in-out;
    }
    @keyframes textBounce {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
      60% { transform: translateY(-4px); }
    }

    .caption-sub {
      font-size: 1rem;
      font-weight: 400;
      color: #8a5070;
      margin-top: 0.3rem;
    }

    .btn-back {
      margin-top: 1vh;
      padding: 0.5rem 1.8rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      background: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,105,135,0.3);
      border-radius: 50px;
      cursor: pointer;
      color: #8a5070;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    .btn-back:hover { background: rgba(255,255,255,0.8); color: #4a2036; transform: translateY(-2px); }

    /* Responsive */
    @media (max-width: 500px) {
      .card { padding: 1.5rem 1.2rem; }
      .question { font-size: 1.4rem; }
      .buttons { flex-direction: column; gap: 0.8rem; }
      .btn { width: 100%; }
      .caption-main { font-size: 1.2rem; }
      .video-box { max-height: 40vh; }
      .video-box video { max-height: 40vh; }
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="hearts-bg"></div>

  <!-- SCREEN 1: Question -->
  <div class="screen active" id="screen-question">
    <div class="card">
      <div class="emoji-top">💍</div>
      <h1 class="question">
        Will you be my Life Partner?
        <span>Choose wisely... 😏</span>
      </h1>
      <div class="buttons">
        <button class="btn btn-yes" id="btn-yes" onclick="showResult('yes')">YES 💖</button>
        <button class="btn btn-no" id="btn-no" onclick="showResult('no')">NO 😅</button>
      </div>
    </div>
  </div>

  <!-- SCREEN 2: YES Result -->
  <div class="screen result-screen" id="screen-yes">
    <div class="result-emoji">😹</div>
    <div class="video-box">
      <video id="vid-yes" loop playsinline preload="auto"></video>
    </div>
    <div class="result-text">
      <p class="caption-main">April Fool 🤣</p>
      <p class="caption-sub">Did you just say Yes? 😳💕</p>
    </div>
    <button class="btn-back" onclick="goBack()">← Try Again</button>
  </div>

  <!-- SCREEN 3: NO Result -->
  <div class="screen result-screen" id="screen-no">
    <div class="result-emoji">😹</div>
    <div class="video-box">
      <video id="vid-no" loop playsinline preload="auto"></video>
    </div>
    <div class="result-text">
      <p class="caption-main">Tumhe kya laga me tumhe such me? 😂</p>
      <p class="caption-sub">But yeah maybe in future 😏💕</p>
    </div>
    <button class="btn-back" onclick="goBack()">← Try Again</button>
  </div>

  <!-- Preloaded video data (embedded for instant loading on GitHub Pages) -->
  <script src="cat-data.js"></script>
  <script>
    // Set video sources from embedded data
    document.getElementById('vid-yes').src = CAT_VIDEO;
    document.getElementById('vid-no').src = CAT_VIDEO;

    // ===== Floating Hearts =====
    const heartsBg = document.getElementById('hearts-bg');
    const emojis = ['💕','💗','💖','💘','💝','🩷','♥️','✨'];
    function createHeart() {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 100 + '%';
      h.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
      h.style.animationDuration = (Math.random() * 6 + 6) + 's';
      h.style.animationDelay = Math.random() * 2 + 's';
      heartsBg.appendChild(h);
      setTimeout(() => h.remove(), 14000);
    }
    for (let i = 0; i < 12; i++) setTimeout(createHeart, i * 300);
    setInterval(createHeart, 800);

    // ===== Screen Management =====
    function switchScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showResult(choice) {
      const screenId = choice === 'yes' ? 'screen-yes' : 'screen-no';
      const videoId = choice === 'yes' ? 'vid-yes' : 'vid-no';

      switchScreen(screenId);

      const video = document.getElementById(videoId);
      video.muted = false;
      video.currentTime = 0;
      video.play().catch(e => {
        // Autoplay with audio may be blocked — try muted first then unmute
        video.muted = true;
        video.play().then(() => { video.muted = false; });
      });
    }

    function goBack() {
      // Stop all videos
      ['vid-yes', 'vid-no'].forEach(id => {
        const v = document.getElementById(id);
        v.pause();
        v.muted = true;
        v.currentTime = 0;
      });
      switchScreen('screen-question');
    }
  </script>
</body>
</html>
